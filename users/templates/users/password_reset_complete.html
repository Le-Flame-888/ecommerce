{% extends 'base.html' %}

{% block title %}Mot de passe réinitialisé | LUXE.{% endblock %}

{% block content %}
<div class="min-h-screen bg-brand-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-12 px-4 shadow-2xl sm:rounded-2xl sm:px-10 border border-gray-100 text-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                <svg class="h-8 w-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-black text-gray-900 tracking-tight uppercase font-heading mb-4">
                Succès !
            </h2>
            <p class="text-gray-600 mb-8">
                Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
            </p>
            <a href="{% url 'users:login' %}" class="inline-block w-full py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-black hover:bg-gray-800 transition-all duration-200 transform hover:scale-[1.02]">
                Se connecter
            </a>
        </div>
    </div>
</div>
{% endblock %}
